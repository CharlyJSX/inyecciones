<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registro de Inyecciones</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <h1>Registro de Inyecciones</h1>
  <form id="formulario">
    <input type="text" id="nombre" placeholder="Nombre" required />
    <input type="date" id="fecha" required />
    <input type="number" id="duracion" placeholder="Duración (meses)" required />
    <button type="submit">Registrar</button>
  </form>

  <h2>Usuarias registradas</h2>
  <ul id="lista"></ul>

  <script src="script.js"></script>
</body>
</html>
